<style>

@font-face { font-family: 'Chelsea'; src: url('ChelseaRRBold.otf') format('opentype'); font-weight: 700; }

body { font-family: 'Chelsea', -apple-system, sans-serif; font-weight: 300; background: #1A5C34; min-height: 100vh;

.top-banner { background: #1A5C34; padding: 18px 20px 14px; text-align: center; margin-bottom: 20px; }
.brand-name { font-family: 'PizzaPilgrims'; font-size: 20px; color: #39D400; margin-bottom: 4px; }

label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; font-weight: 500; }
select, input[type=text], input[type=number] { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #c8c2aa; background: #fdfaf3; font-size: 15px; color: #111; font-family: 'Chelsea', sans-serif; }
textarea { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #c8c2aa; background: #fdfaf3; font-size: 13px; resize: none; color: #111; font-family: 'Chelsea', sans-serif; }

.progress-fill { height: 5px; border-radius: 3px; background: #1A5C34; transition: width 0.3s; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.section-title { font-family: 'PizzaPilgrims'; font-size: 22px; color: #1A5C34; }
.question { margin-bottom: 18px; }
.question p { font-size: 14px; color: #222; margin-bottom: 11px; line-height: 1.5; }
.score-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.score-btn { width: 42px; height: 42px; border-radius: 21px; border: 1.5px solid #c8c2aa; background: #fff; color: #666; font-weight: 500; font-size: 14px; cursor: pointer; font-family: 'Chelsea', sans-serif; }
.photo-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1px dashed #c8c2aa; border-radius: 8px; background: #fdfaf3; color: #888; font-size: 13px; cursor: pointer; margin-top: 12px; font-family: 'Chelsea', sans-serif; }

.error-box { margin-bottom: 10px; padding: 10px 14px; border-radius: 8px; background: rgba(226,75,74,0.08); color: #a32d2d; font-size: 13px; }

.confirm-brand { font-family: 'PizzaPilgrims'; font-size: 26px; color: #1A5C34; margin-bottom: 24px; }

<body>
<div class="wrap" id="app"><div class="loading">Loading…</div></div>
<script>
const SB_URL = "https://jjziogebkovhcxvsuayf.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqemlvZ2Via292aGN4dnN1YXlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjc3NDIsImV4cCI6MjA5MDcwMzc0Mn0.EBbrq-4c7IAA2YIevfiATuPcnDxf9WEzcwzaprdp_UI";
const H = {"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY};

const RESTAURANTS = [
  "Birmingham","Brighton","Camden","Cambridge","Canary Wharf","Cardiff",
  "Carnaby","Chelsea","Covent Garden","Edinburgh","Euston","Exmouth Market",
  "Glasgow","Hyde Park","King's Cross","Leeds","Liverpool Street",
  "London Bridge","Manchester","Nottingham","Queens Park","Selfridges","Shoreditch",
  "Soho","Spitalfields","Swingers West End","Victoria","Waterloo","Westfield",
  "Stratford"
];

const SECTIONS = [
  {id:"pizza",label:"Pizza",weight:14,questions:[
    {id:"spec",label:"Is the pizza made to spec?"},
    {id:"dough",label:"Dough texture — is the crust light, airy and correctly charred?"},
    {id:"bake",label:"Bake / cooking — is the base cooked through without being burnt or underdone?"}
  ]},
  {id:"sides",label:"Sides & Salads",weight:1,questions:[
    {id:"spec",label:"Are our sides/salads made to spec?"},
    {id:"fresh",label:"Are the ingredients fresh and well-dressed (salads)?"}
  ]},
  {id:"dippers",label:"Dippers",weight:0.5,questions:[
    {id:"spec",label:"Are our dippers made to spec?"}
  ]},
  {id:"afterpizza",label:"After Pizza",weight:1,questions:[
    {id:"spec",label:"Is everything made to spec?"},

  ]},
  {id:"drinks",label:"Drinks",weight:1.5,questions:[
    {id:"spec",label:"Are our drinks made to spec?"}
  ]},
  {id:"availability",label:"Menu Availability",weight:1,special:"availability"},
  {id:"vibe",label:"Overall Vibe & Service",weight:1,questions:[
    {id:"vibe",label:"What's the overall vibe of the pizzeria today?"}
  ]}
];

const PHOTO_RULES = {pizza:"mandatory",sides:"optional",dippers:"none",afterpizza:"optional",drinks:"optional",availability:"none",vibe:"none"};
const MANDATORY_PHOTOS = ["pizza"];
const TOTAL_Q = SECTIONS.reduce((a,s)=>a+(s.special?1:s.questions.length),0);
const TOTAL_WITH_PHOTOS = TOTAL_Q + MANDATORY_PHOTOS.length;

const MONTHS_LONG = ["January","February","March","April","May","June","July","August","September","October","November","December"];
function formatDate(d){ const p=d.split("-"); return parseInt(p[2])+" "+MONTHS_LONG[parseInt(p[1])-1]+" "+p[0]; }

let state = {
  view:"form", pizzeria:"", auditor:"", team:"",
  scores:{}, photoFiles:{}, photoPreviews:{}, notes:{},
  availability:{answer:"",items:"",pizzas:""},
  submitting:false, submitError:"", currentReport:null, pdfDataUri:null
};

function scoreColor(p){ if(p===100)return"#C9A84C";if(p>=95)return"#1A5C34";if(p>=90)return"#39D400";if(p>=85)return"#6B8FA8";if(p>=75)return"#EF9F27";return"#E24B4A"; }
function scoreLabel(p){ if(p===100)return"Faje Paura!";if(p>=95)return"STARS!";if(p>=90)return"Very good!";if(p>=85)return"Good but..!";if(p>=75)return"Not great!";return"NEED TO FIX URGENTLY!"; }

function calcScores(scores,avail){
  let total=0,maxTotal=0;
  const ss={};
  SECTIONS.forEach(s=>{
    if(s.special==="availability"){
      let raw=5;
      if(avail.answer==="no"){
        const items=parseInt(avail.items)||0;
        const pizzas=Math.min(parseInt(avail.pizzas)||0,items);
        const other=Math.max(0,items-pizzas);
        raw=Math.max(0,5-(pizzas*0.25)-(other*0.05));
      }
      const weighted=raw*s.weight;
      ss[s.id]={raw:Math.round(raw*100)/100,weighted,maxWeighted:5*s.weight};
      total+=weighted; maxTotal+=5*s.weight;
    } else {
      let sum=0,count=0;
      s.questions.forEach(q=>{ const v=scores[s.id]?.[q.id]; if(v!==undefined){sum+=v;count++;} });
      const raw=count>0?sum/count:null;
      const weighted=raw!==null?raw*s.weight:null;
      ss[s.id]={raw,weighted,maxWeighted:5*s.weight};
      if(weighted!==null){total+=weighted;maxTotal+=5*s.weight;}
    }
  });
  const pct=maxTotal>0?Math.round((total/maxTotal)*100):0;
  return {sectionScores:ss,total:Math.round(total*10)/10,maxTotal,pct};
}

function answeredCount(){
  const qCount=SECTIONS.reduce((a,s)=>{
    if(s.special==="availability") return a+(state.availability.answer!==""?1:0);
    return a+s.questions.filter(q=>state.scores[s.id]?.[q.id]!==undefined).length;
  },0);
  const photoCount=MANDATORY_PHOTOS.filter(sid=>state.photoFiles[sid]).length;
  return qCount+photoCount;
}

async function compressImage(file){
  return new Promise(resolve=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=1000;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      c.toBlob(blob=>{URL.revokeObjectURL(url);resolve(blob);},"image/jpeg",0.7);
    };img.src=url;
  });
}

async function uploadPhoto(blob,sid,pizzeria){
  const name=pizzeria.replace(/\s+/g,"-").toLowerCase()+"-"+sid+"-"+Date.now()+".jpg";
  const r=await fetch(SB_URL+"/storage/v1/object/audit-photos/"+name,{
    method:"POST",
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"image/jpeg","x-upsert":"true"},
    body:blob
  });
  if(!r.ok) throw new Error("Photo upload failed");
  return SB_URL+"/storage/v1/object/public/audit-photos/"+name;
}

async function generatePDF(report){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const W=210,margin=15,contentW=W-margin*2;
  let y=margin;
  doc.setFillColor(26,92,52);
  doc.rect(0,0,W,35,"F");
  doc.setTextColor(57,212,0);
  doc.setFontSize(9);
  doc.text("PIZZA PILGRIMS",W/2,11,{align:"center"});
  doc.setTextColor(245,240,220);
  doc.setFontSize(16);
  doc.text("FOOD QUALITY AUDIT",W/2,22,{align:"center"});
  y=42;
  doc.setTextColor(30,30,30);
  doc.setFontSize(14);
  doc.text(report.restaurant,margin,y); y+=7;
  doc.setFontSize(9);
  doc.setTextColor(100,100,100);
  doc.text(formatDate(report.audit_date)+" · "+report.auditor+(report.team?" · "+report.team:""),margin,y); y+=8;
  const rgb=report.pct===100?[201,168,76]:report.pct>=95?[26,92,52]:report.pct>=90?[57,212,0]:report.pct>=85?[107,143,168]:report.pct>=75?[239,159,39]:[226,75,74];
  doc.setFillColor(...rgb);
  doc.roundedRect(margin,y,contentW,14,3,3,"F");
  doc.setTextColor(255,255,255);
  doc.setFontSize(13);
  doc.text(report.pct+"% — "+scoreLabel(report.pct),W/2,y+9,{align:"center"});
  y+=20;
  SECTIONS.forEach(s=>{
    const sc=report.sectionScores[s.id];
    const pct=sc.maxWeighted>0?Math.round((sc.weighted/sc.maxWeighted)*100):0;
    const rgb2=pct===100?[201,168,76]:pct>=95?[26,92,52]:pct>=90?[57,212,0]:pct>=85?[107,143,168]:pct>=75?[239,159,39]:[226,75,74];
    if(y>260){doc.addPage();y=margin;}
    doc.setFillColor(245,240,220);
    doc.roundedRect(margin,y,contentW,8,2,2,"F");
    doc.setTextColor(26,92,52);
    doc.setFontSize(9);
    doc.text(s.label,margin+3,y+5.5);
    doc.setFillColor(...rgb2);
    doc.roundedRect(W-margin-22,y+1.5,22,5,1,1,"F");
    doc.setTextColor(255,255,255);
    doc.setFontSize(8);
    doc.text(pct+"%",W-margin-11,y+5.5,{align:"center"});
    y+=11;
    if(!s.special){
      s.questions.forEach(q=>{
        const val=report.scores[s.id]?.[q.id];
        doc.setTextColor(80,80,80);
        doc.setFontSize(8);
        const lines=doc.splitTextToSize("• "+q.label,contentW-20);
        doc.text(lines,margin+2,y);
        doc.setTextColor(30,30,30);
        doc.text(val!==undefined?val+"/5":"–",W-margin-2,y,{align:"right"});
        y+=lines.length*4+1;
      });
    } else {
      doc.setTextColor(80,80,80);
      doc.setFontSize(8);
      const avText=report.availability?.answer==="yes"?"Full menu available":"Items unavailable: "+(report.availability?.items||0)+" (pizzas: "+(report.availability?.pizzas||0)+")";
      doc.text("• "+avText,margin+2,y); y+=5;
    }
    if(report.notes[s.id]){
      doc.setTextColor(100,100,100);
      doc.setFontSize(8);
      const nLines=doc.splitTextToSize("Notes: "+report.notes[s.id],contentW-4);
      doc.text(nLines,margin+2,y);
      y+=nLines.length*4+1;
    }
    y+=3;
  });
  const photoSections=SECTIONS.filter(s=>PHOTO_RULES[s.id]&&PHOTO_RULES[s.id]!=="none"&&state.photoFiles[s.id]);
  if(photoSections.length>0){
    doc.addPage();
    let py=margin;
    doc.setFillColor(26,92,52);
    doc.rect(0,0,W,18,"F");
    doc.setTextColor(245,240,220);
    doc.setFontSize(11);
    doc.text("PHOTOS — "+report.restaurant.toUpperCase(),W/2,12,{align:"center"});
    py=25;
    for(const s of photoSections){
      const file=state.photoFiles[s.id];
      if(!file) continue;
      const dataUrl=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});
      const imgW=Math.min(120,contentW);
      const imgH=Math.min(80,imgW*0.75);
      const imgX=margin+(contentW-imgW)/2;
      if(py+imgH+10>285) break;
      doc.setFontSize(9);
      doc.setTextColor(26,92,52);
      doc.text(s.label,margin,py); py+=5;
      doc.addImage(dataUrl,"JPEG",imgX,py,imgW,imgH);
      py+=imgH+8;
    }
  }
  return doc.output("datauristring");
}

async function handleSubmit(){
  state.submitting=true; state.submitError=""; render();
  try{
    const photoUrls={};
    for(const [sid,file] of Object.entries(state.photoFiles)){
      try{ const blob=await compressImage(file); photoUrls[sid]=await uploadPhoto(blob,sid,state.pizzeria); }
      catch(e){ photoUrls[sid]=null; }
    }
    const result=calcScores(state.scores,state.availability);
    const payload={
      restaurant:state.pizzeria, auditor:state.auditor, team:state.team,
      scores:state.scores, notes:state.notes,
      photo_urls:photoUrls, pct:result.pct,
      total_weighted:result.total, section_scores:result.sectionScores,
      availability:state.availability,
      audit_date:new Date().toISOString().split("T")[0]
    };
    const res=await fetch(SB_URL+"/rest/v1/audits",{
      method:"POST",
      headers:Object.assign({},H,{"Prefer":"return=minimal"}),
      body:JSON.stringify(payload)
    });
    if(!res.ok){ const t=await res.text(); throw new Error(t); }
    state.currentReport={...payload,...result};
    state.view="report";
    state.submitting=false;
    render();
    generatePDF(state.currentReport).then(uri=>{ state.pdfDataUri=uri; }).catch(e=>console.error("PDF error:",e));
    return;
  } catch(e){
    state.submitError="Save failed: "+e.message;
  }
  state.submitting=false; render();
}

function resetForm(){
  state={...state,view:"form",pizzeria:"",auditor:"",team:"",scores:{},photoFiles:{},photoPreviews:{},notes:{},
    availability:{answer:"",items:"",pizzas:""},submitting:false,submitError:"",currentReport:null,pdfDataUri:null};
  render();
}

function handlePhotoChange(sid,input){
  const file=input.files[0]; if(!file)return;
  state.photoFiles[sid]=file;
  state.photoPreviews[sid]={url:URL.createObjectURL(file),name:file.name};
  render();
}

function banner(){
  return '<div class="top-banner"><div class="brand-name">Pizza Pilgrims</div><div class="page-title">Food Quality Audit</div></div>';
}

function render(){
  const app=document.getElementById("app");
  if(state.view==="report") renderConfirm(app);
  else renderForm(app);
}

function renderConfirm(app){
  app.innerHTML=banner()+`<div class="inner"><div class="confirm-wrap">
    <div class="confirm-check">✓</div>
    <div class="confirm-title">Audit Completed!</div>
    <div class="confirm-brand">pizz'&amp;love</div>
    <div class="confirm-meta">${state.currentReport.restaurant} · ${formatDate(state.currentReport.audit_date)}</div>
    <div style="margin:20px auto 28px;max-width:300px;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.2)"><img src="https://i.ibb.co/99gsW0yx/IMG-6616.jpg" style="width:100%;display:block"></div>
    <button class="btn-start" style="max-width:240px;margin:0 auto;display:block" onclick="resetForm()">New Audit</button>
  </div></div>`;
}

  const availNoteRequired=state.availability.answer==="no"&&!state.notes['availability'];
  const canSubmit=state.pizzeria&&state.auditor&&ac===TOTAL_WITH_PHOTOS&&!state.submitting&&!availNoteRequired;
  const cols=["#E24B4A","#D85A30","#EF9F27","#639922","#1D9E75","#0F6E56"];

  if(!state.pizzeria||!state.auditor){

        <select onchange="state.pizzeria=this.value;render()">
          <option value="">Select pizzeria…</option>
          ${RESTAURANTS.map(r=>`<option value="${r}"${state.pizzeria===r?" selected":""}>${r}</option>`).join("")}
        </select>
      </div>
      <div style="margin-bottom:14px"><label>Your name</label>
        <input type="text" id="auditor-input" value="${state.auditor}" placeholder="Your name" oninput="state.auditor=this.value">
      </div>
      <div><label>Your team</label>
        <input type="text" id="team-input" value="${state.team}" placeholder="Your team…" oninput="state.team=this.value">
      </div>
      ${state.pizzeria?`<button class="btn-start" onclick="state.auditor=document.getElementById('auditor-input').value;state.team=document.getElementById('team-input').value;if(state.auditor){render();}">Start Audit →</button>`:""}
      <div style="margin-top:16px;border-radius:10px;overflow:hidden;max-width:70%;margin-left:auto;margin-right:auto"><img src="https://i.ibb.co/0yndCqdc/IMG-5797.jpg" style="width:100%;display:block"></div>
    </div>`;
  } else {
    const pct=Math.round((ac/TOTAL_WITH_PHOTOS)*100);
    html+=`<div style="position:sticky;top:0;z-index:10;background:#F5F0DC;padding:8px 0 6px">
      <div class="progress-wrap" style="margin-bottom:0">
        <div class="progress-info">
          <span style="display:flex;align-items:center;gap:8px">
            <button onclick="state.pizzeria='';state.auditor='';state.team='';render()" style="font-size:11px;color:#1A5C34;background:none;border:0.5px solid #1A5C34;border-radius:6px;padding:2px 8px;cursor:pointer;font-family:'Chelsea',sans-serif">← Edit</button>
            <span>${state.pizzeria} · ${state.auditor}${state.team?" · "+state.team:""}</span>
          </span>
          <span>${ac}/${TOTAL_WITH_PHOTOS}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;

    SECTIONS.forEach(s=>{
      const av=state.availability;
      html+=`<div class="card"><div class="section-header"><span class="section-title">${s.label}</span></div>`;
      if(s.special==="availability"){
        html+=`<div class="question"><p>Is all the menu available?</p>
          <div style="display:flex;gap:10px;margin-top:8px">
            <button class="yn-btn" onclick="state.availability.answer='yes';render()" style="border:${av.answer==='yes'?'2px solid #1A5C34':'1px solid #c8c2aa'};background:${av.answer==='yes'?'#1A5C34':'#fff'};color:${av.answer==='yes'?'#F5F0DC':'#111'}">Yes</button>
            <button class="yn-btn" onclick="state.availability.answer='no';render()" style="border:${av.answer==='no'?'2px solid #E24B4A':'1px solid #c8c2aa'};background:${av.answer==='no'?'#E24B4A':'#fff'};color:${av.answer==='no'?'#fff':'#111'}">No</button>
          </div>
          ${av.answer==='no'?`<div style="margin-top:14px">
            <div style="margin-bottom:12px"><label>How many items are unavailable?</label>
              <input type="number" min="0" value="${av.items}" placeholder="0" oninput="state.availability.items=this.value;state.availability.pizzas='';render()">
            </div>
            ${av.items>0?`<div><label>How many of those are pizzas?</label>
              <input type="number" min="0" max="${av.items}" value="${av.pizzas}" placeholder="0" oninput="state.availability.pizzas=this.value;render()">
            </div>`:''}
            <div style="margin-top:12px"><label>List the unavailable items here</label>
              <textarea rows="3" placeholder="List the unavailable items here…" oninput="state.notes['availability']=this.value" style="border-color:${!state.notes['availability']?'#E24B4A':'#c8c2aa'}">${state.notes['availability']||""}</textarea>
              ${!state.notes['availability']?`<p style="font-size:11px;color:#E24B4A;margin-top:4px">Required — please list the unavailable items</p>`:""}
            </div>`:''}
          </div>`;
      } else {
        html+=s.questions.map(q=>{
          const val=state.scores[s.id]?.[q.id];
          return `<div class="question"><p>${q.label}</p>
            <div class="score-btns">
              ${[0,1,2,3,4,5].map(v=>`<button class="score-btn"
                onclick="if(!state.scores['${s.id}'])state.scores['${s.id}']={};state.scores['${s.id}']['${q.id}']=${v};render()"
                style="${val===v?`background:${cols[v]};color:#fff;border-color:${cols[v]};`:'border-color:#c8c2aa;'}">${v}</button>`).join("")}
            </div></div>`;
        }).join("");
        html+=`<textarea rows="2" placeholder="Notes (optional)…" oninput="state.notes['${s.id}']=this.value">${state.notes[s.id]||""}</textarea>`;
      }
      const photoRule=PHOTO_RULES[s.id];
      if(photoRule!=="none"){
        html+=`<div style="margin-top:10px">
          ${state.photoPreviews[s.id]
            ?`<div class="photo-preview"><img src="${state.photoPreviews[s.id].url}"><div><div class="photo-name">${state.photoPreviews[s.id].name}</div><button class="photo-change" onclick="document.getElementById('f-${s.id}').click()">Change photo</button></div></div>`
            :`<button class="photo-btn" onclick="document.getElementById('f-${s.id}').click()" style="${photoRule==='mandatory'?'border-color:#1A5C34;color:#1A5C34':''}">${photoRule==='mandatory'?'📷 Add pizza photo (required)':'📷 Add photo (optional)'}</button>`}
          <input type="file" id="f-${s.id}" accept="image/*" style="display:none" onchange="handlePhotoChange('${s.id}',this)">
          ${photoRule==='mandatory'&&!state.photoPreviews[s.id]?`<p style="font-size:11px;color:#E24B4A;margin-top:4px">Required — please add a photo of the pizza</p>`:""}
        </div>`;
      }
      html+=`</div>`;
    });

    html+=`${state.submitError?`<div class="error-box">${state.submitError}</div>`:""}
    <button class="btn-start" style="${canSubmit?'':'background:#b0b0a0;'}" ${canSubmit?'onclick="handleSubmit()"':''}>
      ${state.submitting?"Saving…":"Submit Audit ✓"}
    </button>
    ${!canSubmit?`<p class="hint">Answer all questions and add the pizza photo to submit</p>`:""}`;
  }
  html+='</div>';
  app.innerHTML=html;
}

render();
</script>
</body>
</html>
