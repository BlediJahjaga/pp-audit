<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza Pilgrims — Food Quality Audit</title>
<style>
@font-face { font-family: 'PizzaPilgrims'; src: url('PizzaPilgrims.otf') format('opentype'); font-weight: normal; }
@font-face { font-family: 'Chelsea'; src: url('ChelseaRRBold.otf') format('opentype'); font-weight: 700; }
@font-face { font-family: 'Chelsea'; src: url('ChelseaRRLight.otf') format('opentype'); font-weight: 300; }
</style>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Chelsea', -apple-system, sans-serif; font-weight: 300; background: #1A5C34; min-height: 100vh;
  background-image: url('https://www.datocms-assets.com/94903/1741971975-pp-pizza-spread-with-menu.jpg?auto=format&w=2080');
  background-size: cover; background-position: center; background-attachment: fixed; }
body::before { content: ''; position: fixed; inset: 0; background: rgba(26,92,52,0.82); z-index: 0; }
.wrap { max-width: 540px; margin: 0 auto; padding: 0 0 3rem; position: relative; z-index: 1; background: #F5F0DC; min-height: 100vh; box-shadow: 0 0 60px rgba(0,0,0,0.4); }

/* Header banner */
.top-banner { background: #1A5C34; padding: 18px 20px 14px; text-align: center; margin-bottom: 20px; }
.brand-name { font-family: 'PizzaPilgrims'; font-size: 20px; font-weight: normal; color: #39D400; letter-spacing: 0.05em; text-transform: none; margin-bottom: 4px; }
.page-title { font-family: 'PizzaPilgrims'; font-size: 28px; font-weight: normal; color: #F5F0DC; letter-spacing: 0.03em; text-transform: none; }

.inner { padding: 0 1rem; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.status-label { font-size: 12px; font-weight: 500; color: #1A5C34; text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 6px; }
.status-label::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: #1A5C34; display: inline-block; }

.card { background: #fff; border: 0.5px solid #d4ceb8; border-radius: 12px; padding: 16px 14px; margin-bottom: 14px; }
label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; font-weight: 500; }
select, input[type=text], input[type=number] { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #c8c2aa; background: #fdfaf3; font-size: 15px; color: #111; font-family: 'Inter', sans-serif; }
textarea { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #c8c2aa; background: #fdfaf3; font-size: 13px; resize: none; color: #111; font-family: 'Inter', sans-serif; }

.progress-wrap { margin-bottom: 16px; }
.progress-info { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-bottom: 6px; }
.progress-bar { height: 5px; border-radius: 3px; background: #d4ceb8; }
.progress-fill { height: 5px; border-radius: 3px; background: #1A5C34; transition: width 0.3s; }

.tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.tab { padding: 6px 11px; border-radius: 16px; font-size: 12px; border: 1px solid #c8c2aa; background: #fff; color: #666; cursor: pointer; font-family: 'Chelsea', sans-serif; font-weight: 300; }
.tab.active { border-color: #1A5C34; background: #1A5C34; color: #F5F0DC; font-weight: 500; }
.tab.done { background: rgba(26,92,52,0.1); color: #1A5C34; border-color: #1A5C34; }

.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.section-title { font-family: 'PizzaPilgrims'; font-size: 22px; font-weight: normal; color: #1A5C34; letter-spacing: 0.02em; }
.weight-badge { font-size: 11px; padding: 3px 9px; border-radius: 10px; background: #1A5C34; color: #39D400; font-family: 'Chelsea', sans-serif; font-weight: 700; }

.question { margin-bottom: 18px; }
.question p { font-size: 14px; color: #222; margin-bottom: 11px; line-height: 1.5; }
.score-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.score-btn { width: 42px; height: 42px; border-radius: 21px; border: 1.5px solid #c8c2aa; background: #fff; color: #666; font-weight: 500; font-size: 14px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.1s; }

.photo-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1px dashed #c8c2aa; border-radius: 8px; background: #fdfaf3; color: #888; font-size: 13px; cursor: pointer; margin-top: 12px; font-family: 'Inter', sans-serif; }
.photo-preview { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
.photo-preview img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #d4ceb8; }
.photo-change { font-size: 12px; color: #1A5C34; background: none; border: none; cursor: pointer; padding: 0; font-family: 'Inter', sans-serif; }
.photo-name { font-size: 12px; color: #888; }

.btn-row { display: flex; gap: 10px; margin-top: 6px; }
.btn { flex: 1; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: 'Inter', sans-serif; border: 1px solid #c8c2aa; background: #eee8d5; color: #333; }
.btn-primary { background: #1A5C34; color: #F5F0DC; border-color: #1A5C34; font-weight: 500; }
.btn-primary:disabled { background: #b0b0a0; border-color: #b0b0a0; color: #eee; cursor: default; }
.btn-start { width: 100%; padding: 14px; border-radius: 8px; background: #1A5C34; color: #F5F0DC; border: none; font-size: 20px; font-weight: normal; cursor: pointer; margin-top: 18px; font-family: 'PizzaPilgrims'; letter-spacing: 0.05em; }

.error-box { margin-bottom: 10px; padding: 10px 14px; border-radius: 8px; background: rgba(226,75,74,0.08); color: #a32d2d; font-size: 13px; }
.hint { margin-top: 10px; font-size: 12px; color: #888; text-align: center; }

.yn-btn { flex: 1; padding: 12px; border-radius: 8px; font-size: 15px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; }

/* Confirm screen */
.confirm-wrap { text-align: center; padding: 4rem 1rem; }
.confirm-check { width: 72px; height: 72px; border-radius: 36px; background: #1A5C34; color: #39D400; font-size: 36px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
.confirm-title { font-family: 'PizzaPilgrims'; font-size: 32px; font-weight: normal; color: #1A5C34; letter-spacing: 0.03em; margin-bottom: 8px; }
.confirm-brand { font-family: 'PizzaPilgrims'; font-size: 26px; color: #1A5C34; margin-bottom: 24px; }
.confirm-meta { font-size: 13px; color: #888; margin-bottom: 36px; }

.loading { text-align: center; padding: 2rem; color: #666; font-size: 14px; }
</style>
</head>
<body>
<div class="wrap" id="app"><div class="loading">Loading…</div></div>
<script>
const SB_URL = "https://jjziogebkovhcxvsuayf.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqemlvZ2Via292aGN4dnN1YXlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjc3NDIsImV4cCI6MjA5MDcwMzc0Mn0.EBbrq-4c7IAA2YIevfiATuPcnDxf9WEzcwzaprdp_UI";
const H = {"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY};

const RESTAURANTS = [
  "Birmingham","Brighton","Bristol","Camden","Cambridge","Canary Wharf","Cardiff",
  "Carnaby","Chelsea","Covent Garden","Edinburgh","Euston","Exmouth Market",
  "Glasgow","Greenwich","Hyde Park","King's Cross","Leeds","Liverpool Street",
  "London Bridge","Manchester","Nottingham","Queens Park","Selfridges","Shoreditch",
  "Soho","Spitalfields","Swingers West End","Victoria","Waterloo","Westfield",
  "Westfield Stratford","Wimbledon"
];

const SECTIONS = [
  {id:"pizza",label:"Pizza",weight:14,questions:[
    {id:"spec",label:"Is the pizza made to spec?"},
    {id:"dough",label:"Dough texture — is the crust light, airy and correctly charred?"},
    {id:"bake",label:"Bake / cooking — is the base cooked through without being burnt or underdone?"}
  ]},
  {id:"sides",label:"Sides & Salads",weight:1,questions:[
    {id:"spec",label:"Are our sides/salads made to spec?"},
    {id:"fresh",label:"Are the ingredients fresh and well-dressed (salads)?"}
  ]},
  {id:"dippers",label:"Dippers",weight:0.5,questions:[
    {id:"spec",label:"Are our dippers made to spec?"}
  ]},
  {id:"afterpizza",label:"After Pizza",weight:1,questions:[
    {id:"spec",label:"Is everything made to spec?"},
    {id:"temp",label:"Is everything served at the correct temperature and presented neatly?"}
  ]},
  {id:"drinks",label:"Drinks",weight:1.5,questions:[
    {id:"spec",label:"Are our drinks made to spec?"}
  ]},
  {id:"availability",label:"Menu Availability",weight:1,special:"availability"},
  {id:"vibe",label:"Overall Vibe & Service",weight:1,questions:[
    {id:"vibe",label:"What's the overall vibe of the pizzeria today?"}
  ]}
];

const TOTAL_Q = SECTIONS.reduce((a,s)=>a+(s.special?1:s.questions.length),0);

let state = {
  view:"form", pizzeria:"", auditor:"", team:"",
  scores:{}, photoFiles:{}, photoPreviews:{}, notes:{},
  availability:{answer:"",items:"",pizzas:""},
  activeSection:0, submitting:false, submitError:"",
  currentReport:null, confirmPhoto:null
};

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
function formatDate(d){ const p=d.split("-"); return parseInt(p[2])+" "+MONTHS[parseInt(p[1])-1]+" "+p[0]; }

function scoreColor(p){ return p>=80?"#0F6E56":p>=60?"#3B6D11":p>=40?"#EF9F27":"#E24B4A"; }

function calcScores(scores,avail){
  let total=0,maxTotal=0;
  const ss={};
  SECTIONS.forEach(s=>{
    if(s.special==="availability"){
      let raw=5;
      if(avail.answer==="no"){
        const items=parseInt(avail.items)||0;
        const pizzas=Math.min(parseInt(avail.pizzas)||0,items);
        const other=Math.max(0,items-pizzas);
        raw=Math.max(0,5-(pizzas*0.25)-(other*0.05));
      }
      const weighted=raw*s.weight;
      ss[s.id]={raw:Math.round(raw*100)/100,weighted,maxWeighted:5*s.weight};
      total+=weighted; maxTotal+=5*s.weight;
    } else {
      let sum=0,count=0;
      s.questions.forEach(q=>{ const v=scores[s.id]?.[q.id]; if(v!==undefined){sum+=v;count++;} });
      const raw=count>0?sum/count:null;
      const weighted=raw!==null?raw*s.weight:null;
      ss[s.id]={raw,weighted,maxWeighted:5*s.weight};
      if(weighted!==null){total+=weighted;maxTotal+=5*s.weight;}
    }
  });
  const pct=maxTotal>0?Math.round((total/maxTotal)*100):0;
  return {sectionScores:ss,total:Math.round(total*10)/10,maxTotal,pct};
}

function answeredCount(){
  return SECTIONS.reduce((a,s)=>{
    if(s.special==="availability") return a+(state.availability.answer!==""?1:0);
    return a+s.questions.filter(q=>state.scores[s.id]?.[q.id]!==undefined).length;
  },0);
}

async function compressImage(file){
  return new Promise(resolve=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=1000;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      c.toBlob(blob=>{URL.revokeObjectURL(url);resolve(blob);},"image/jpeg",0.7);
    };img.src=url;
  });
}

async function uploadPhoto(blob,sid,pizzeria){
  const name=pizzeria.replace(/\s+/g,"-").toLowerCase()+"-"+sid+"-"+Date.now()+".jpg";
  const r=await fetch(SB_URL+"/storage/v1/object/audit-photos/"+name,{
    method:"POST",
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"image/jpeg","x-upsert":"true"},
    body:blob
  });
  if(!r.ok) throw new Error("Photo upload failed");
  return SB_URL+"/storage/v1/object/public/audit-photos/"+name;
}

async function handleSubmit(){
  state.submitting=true;state.submitError="";render();
  try{
    const photoUrls={};
    for(const [sid,file] of Object.entries(state.photoFiles)){
      try{const blob=await compressImage(file);photoUrls[sid]=await uploadPhoto(blob,sid,state.pizzeria);}
      catch(e){photoUrls[sid]=null;}
    }
    const result=calcScores(state.scores,state.availability);
    const payload={
      restaurant:state.pizzeria, auditor:state.auditor, team:state.team,
      scores:state.scores, notes:state.notes,
      photo_urls:photoUrls, pct:result.pct,
      total_weighted:result.total, section_scores:result.sectionScores,
      availability:state.availability,
      audit_date:new Date().toISOString().split("T")[0]
    };
    const res=await fetch(SB_URL+"/rest/v1/audits",{
      method:"POST",
      headers:Object.assign({},H,{"Prefer":"return=minimal"}),
      body:JSON.stringify(payload)
    });
    if(!res.ok){const t=await res.text();throw new Error(t);}
    state.currentReport={...payload,...result};
    state.view="report";
  }catch(e){
    state.submitError="Save failed: "+e.message;
  }
  state.submitting=false;render();
}

function resetForm(){
  state={...state,view:"form",pizzeria:"",auditor:"",team:"",scores:{},photoFiles:{},photoPreviews:{},notes:{},
    availability:{answer:"",items:"",pizzas:""},activeSection:0,submitting:false,submitError:"",currentReport:null};
  render();
}

function handleConfirmPhoto(input){
  const file=input.files[0]; if(!file)return;
  state.confirmPhoto=URL.createObjectURL(file);
  render();
}

function handlePhotoChange(sid,input){
  const file=input.files[0];if(!file)return;
  state.photoFiles[sid]=file;
  state.photoPreviews[sid]={url:URL.createObjectURL(file),name:file.name};
  render();
}

function banner(subtitle){
  return `<div class="top-banner">
    <div class="brand-name">Pizza Pilgrims</div>
    <div class="page-title">${subtitle}</div>
  </div>`;
}

function render(){
  const app=document.getElementById("app");
  if(state.view==="report") renderConfirm(app);
  else renderForm(app);
}

function renderConfirm(app){
  app.innerHTML=banner("Food Quality Audit")+`
  <div class="inner">
    <div class="confirm-wrap">
      <div class="confirm-check">✓</div>
      <div class="confirm-title">Audit Completed!</div>
      <div class="confirm-brand">pizz'&amp;love</div>
      <div class="confirm-meta">${state.currentReport.restaurant} · ${formatDate(state.currentReport.audit_date)}</div>
      <div style="margin:20px auto 28px;max-width:300px;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.2)"><img src="https://i.ibb.co/99gsW0yx/IMG-6616.jpg" style="width:100%;display:block"></div>
      <button class="btn-start" style="max-width:240px;margin:0 auto;display:block" onclick="resetForm()">New Audit</button>
    </div>
  </div>`;
}

function renderForm(app){
  const ac=answeredCount();
  const availNoteRequired=state.availability.answer==="no"&&!state.notes['availability'];
  const canSubmit=state.pizzeria&&state.auditor&&ac===TOTAL_Q&&!state.submitting&&!availNoteRequired;
  const s=SECTIONS[state.activeSection];
  const cols=["#E24B4A","#D85A30","#EF9F27","#639922","#1D9E75","#0F6E56"];

  let html=banner("Food Quality Audit")+'<div class="inner">';

  if(!state.pizzeria||!state.auditor){
    html+=`<div class="card">
      <div style="margin-bottom:14px"><label>Pizzeria</label>
        <select onchange="state.pizzeria=this.value;render()">
          <option value="">Select pizzeria…</option>
          ${RESTAURANTS.map(r=>`<option value="${r}"${state.pizzeria===r?" selected":""}>${r}</option>`).join("")}
        </select>
      </div>
      <div style="margin-bottom:14px"><label>Your name</label>
        <input type="text" id="auditor-input" value="${state.auditor}" placeholder="Your name" oninput="state.auditor=this.value">
      </div>
      <div><label>Your team</label>
        <input type="text" id="team-input" value="${state.team}" placeholder="Your team…" oninput="state.team=this.value">
      </div>
      ${state.pizzeria?`<button class="btn-start" onclick="state.auditor=document.getElementById('auditor-input').value;state.team=document.getElementById('team-input').value;if(state.auditor){state.activeSection=0;render();}">Start Audit →</button>`:""}
    </div>`;
  } else {
    const pct=Math.round((ac/TOTAL_Q)*100);
    html+=`    <div class="progress-wrap">
      <div class="progress-info">
        <span style="display:flex;align-items:center;gap:8px">
          <button onclick="state.pizzeria='';state.auditor='';state.team='';state.activeSection=0;render()" style="font-size:11px;color:#1A5C34;background:none;border:0.5px solid #1A5C34;border-radius:6px;padding:2px 8px;cursor:pointer;font-family:'Chelsea',sans-serif">← Edit</button>
          <span>${state.pizzeria} · ${state.auditor}${state.team?" · "+state.team:""}</span>
        </span>
        <span>${ac}/${TOTAL_Q}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="tabs">
      ${SECTIONS.map((sec,i)=>{
        const done=sec.special?state.availability.answer!=="":sec.questions.every(q=>state.scores[sec.id]?.[q.id]!==undefined);
        return `<button class="tab${state.activeSection===i?" active":done?" done":""}" onclick="state.activeSection=${i};render()">${sec.label}</button>`;
      }).join("")}
    </div>
    <div class="card">
      <div class="section-header">
        <span class="section-title">${s.label}</span>
        ${s.weight>1&&s.id!=="pizza"&&s.id!=="drinks"?`<span class="weight-badge">×${s.weight}</span>`:""}
      </div>`;

    const av=state.availability;
    if(s.special==="availability"){
      html+=`<div class="question"><p>Is all the menu available?</p>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button class="yn-btn" onclick="state.availability.answer='yes';render()" style="border:${av.answer==='yes'?'2px solid #1A5C34':'1px solid #c8c2aa'};background:${av.answer==='yes'?'#1A5C34':'#fff'};color:${av.answer==='yes'?'#F5F0DC':'#111'}">Yes</button>
          <button class="yn-btn" onclick="state.availability.answer='no';render()" style="border:${av.answer==='no'?'2px solid #E24B4A':'1px solid #c8c2aa'};background:${av.answer==='no'?'#E24B4A':'#fff'};color:${av.answer==='no'?'#fff':'#111'}">No</button>
        </div>
        ${av.answer==='no'?`<div style="margin-top:14px">
          <div style="margin-bottom:12px"><label>How many items are unavailable?</label>
            <input type="number" min="0" value="${av.items}" placeholder="0" oninput="state.availability.items=this.value;state.availability.pizzas='';render()">
          </div>
          ${av.items>0?`<div><label>How many of those are pizzas?</label>
            <input type="number" min="0" max="${av.items}" value="${av.pizzas}" placeholder="0" oninput="state.availability.pizzas=this.value;render()">
          </div>`:''}
        </div>
        <div style="margin-top:14px">
          <label>List the unavailable items here</label>
          <textarea rows="3" placeholder="List the unavailable items here…" oninput="state.notes['availability']=this.value" style="border-color:${!state.notes['availability']?'#E24B4A':'#c8c2aa'}">${state.notes['availability']||""}</textarea>
          ${!state.notes['availability']?`<p style="font-size:11px;color:#E24B4A;margin-top:4px">Required — please list the unavailable items</p>`:""}
        </div>`:''}
      </div>`;
    } else {
      html+=s.questions.map(q=>{
        const val=state.scores[s.id]?.[q.id];
        return `<div class="question"><p>${q.label}</p>
          <div class="score-btns">
            ${[0,1,2,3,4,5].map(v=>`<button class="score-btn"
              onclick="if(!state.scores['${s.id}'])state.scores['${s.id}']={};state.scores['${s.id}']['${q.id}']=${v};render()"
              style="${val===v?`background:${cols[v]};color:#fff;border-color:${cols[v]};`:'border-color:#c8c2aa;'}">${v}</button>`).join("")}
          </div></div>`;
      }).join("");
      html+=`<textarea rows="2" placeholder="Notes (optional)…" oninput="state.notes['${s.id}']=this.value">${state.notes[s.id]||""}</textarea>`;
    }

    html+=`<div style="margin-top:10px">
        ${state.photoPreviews[s.id]
          ?`<div class="photo-preview"><img src="${state.photoPreviews[s.id].url}"><div><div class="photo-name">${state.photoPreviews[s.id].name}</div><button class="photo-change" onclick="document.getElementById('f-${s.id}').click()">Change photo</button></div></div>`
          :`<button class="photo-btn" onclick="document.getElementById('f-${s.id}').click()">📷 Add photo (optional)</button>`}
        <input type="file" id="f-${s.id}" accept="image/*" style="display:none" onchange="handlePhotoChange('${s.id}',this)">
      </div>
    </div>
    ${state.submitError?`<div class="error-box">${state.submitError}</div>`:""}
    <div class="btn-row">
      ${state.activeSection>0?`<button class="btn" onclick="state.activeSection--;render()">← Back</button>`:""}
      ${state.activeSection<SECTIONS.length-1
        ?`<button class="btn btn-primary" onclick="state.activeSection++;render()">Next →</button>`
        :`<button class="btn btn-primary"${canSubmit?"":" disabled"} onclick="handleSubmit()">${state.submitting?"Saving…":"Submit Audit ✓"}</button>`}
    </div>
    ${!canSubmit&&ac<TOTAL_Q&&state.activeSection===SECTIONS.length-1?`<p class="hint">Answer all questions to submit</p>`:""}`;
  }
  html+='</div>';
  app.innerHTML=html;
}

render();
</script>
</body>
</html>
