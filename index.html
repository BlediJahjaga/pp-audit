function scoreColor(p){
  if(p===100) return "#1A5C34";
  if(p>=95) return "#1A5C34";
  if(p>=90) return "#39D400";
  if(p>=85) return "#C8B97A";
  if(p>=75) return "#EF9F27";
  return "#E24B4A";
}
function scoreLabel(p){
  if(p===100) return "Faje Paura!";
  if(p>=95) return "STARS!";
  if(p>=90) return "Very good!";
  if(p>=85) return "Good but..!";
  if(p>=75) return "Not great!";
  return "NEED TO FIX URGENTLY!";
}

function calcScores(scores,avail){
  let total=0,maxTotal=0;
  const ss={};
  SECTIONS.forEach(s=>{
    if(s.special==="availability"){
      let raw=5;
      if(avail.answer==="no"){
        const items=parseInt(avail.items)||0;
        const pizzas=Math.min(parseInt(avail.pizzas)||0,items);
        const other=Math.max(0,items-pizzas);
        raw=Math.max(0,5-(pizzas*0.25)-(other*0.05));
      }
      const weighted=raw*s.weight;
      ss[s.id]={raw:Math.round(raw*100)/100,weighted,maxWeighted:5*s.weight};
      total+=weighted; maxTotal+=5*s.weight;
    } else {
      let sum=0,count=0;
      s.questions.forEach(q=>{ const v=scores[s.id]?.[q.id]; if(v!==undefined){sum+=v;count++;} });
      const raw=count>0?sum/count:null;
      const weighted=raw!==null?raw*s.weight:null;
      ss[s.id]={raw,weighted,maxWeighted:5*s.weight};
      if(weighted!==null){total+=weighted;maxTotal+=5*s.weight;}
    }
  });
  const pct=maxTotal>0?Math.round((total/maxTotal)*100):0;
  return {sectionScores:ss,total:Math.round(total*10)/10,maxTotal,pct};
}

}

async function compressImage(file,maxSize=1000,quality=0.7){
  return new Promise(resolve=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxSize||h>maxSize){if(w>h){h=Math.round(h*maxSize/w);w=maxSize;}else{w=Math.round(w*maxSize/h);h=maxSize;}}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      c.toBlob(blob=>{URL.revokeObjectURL(url);resolve(blob);},"image/jpeg",quality);
    };img.src=url;
  });
}

async function uploadPhoto(blob,sid,pizzeria){

  const r=await fetch(SB_URL+"/storage/v1/object/audit-photos/"+name,{
    method:"POST",
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"image/jpeg","x-upsert":"true"},
    body:blob
  });
  if(!r.ok) throw new Error("Photo upload failed");
  return SB_URL+"/storage/v1/object/public/audit-photos/"+name;
}

function fileToDataURL(file){
  return new Promise(resolve=>{
    const r=new FileReader();
    r.onload=e=>resolve(e.target.result);
    r.readAsDataURL(file);
  });
}

async function generatePDF(report){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const W=210,margin=15,contentW=W-margin*2;
  let y=margin;

  // Header
  doc.setFillColor(26,92,52);
  doc.rect(0,0,W,35,"F");
  doc.setTextColor(57,212,0);
  doc.setFontSize(10);
  doc.text("PIZZA PILGRIMS",W/2,12,{align:"center"});
  doc.setTextColor(245,240,220);
  doc.setFontSize(16);
  doc.text("FOOD QUALITY AUDIT",W/2,22,{align:"center"});
  y=42;

  // Meta info
  doc.setTextColor(30,30,30);
  doc.setFontSize(13);
  doc.text(report.restaurant,margin,y); y+=7;
  doc.setFontSize(10);
  doc.setTextColor(100,100,100);
  doc.text(formatDate(report.audit_date)+" · "+report.auditor+(report.team?" · "+report.team:""),margin,y); y+=8;

  // Overall score box
  const sc=scoreColor(report.pct);
  const rgb=sc==="#1A5C34"?[26,92,52]:sc==="#39D400"?[57,212,0]:sc==="#C8B97A"?[200,185,122]:sc==="#EF9F27"?[239,159,39]:[226,75,74];
  doc.setFillColor(...rgb);
  doc.roundedRect(margin,y,contentW,14,3,3,"F");
  doc.setTextColor(255,255,255);
  doc.setFontSize(14);
  doc.text(report.pct+"% — "+scoreLabel(report.pct),W/2,y+9,{align:"center"});
  y+=20;

  // Section scores
  SECTIONS.forEach(s=>{
    const sc2=report.sectionScores[s.id];
    const pct2=sc2.maxWeighted>0?Math.round((sc2.weighted/sc2.maxWeighted)*100):0;
    const col=scoreColor(pct2);
    const rgb2=col==="#1A5C34"?[26,92,52]:col==="#39D400"?[57,212,0]:col==="#C8B97A"?[200,185,122]:col==="#EF9F27"?[239,159,39]:[226,75,74];

    if(y>255){ doc.addPage(); y=margin; }

    doc.setFillColor(245,240,220);
    doc.roundedRect(margin,y,contentW,8,2,2,"F");
    doc.setTextColor(26,92,52);
    doc.setFontSize(10);
    doc.text(s.label,margin+3,y+5.5);
    doc.setFillColor(...rgb2);
    doc.roundedRect(W-margin-22,y+1.5,22,5,1,1,"F");
    doc.setTextColor(255,255,255);
    doc.setFontSize(8);
    doc.text(pct2+"%",W-margin-11,y+5.5,{align:"center"});
    y+=11;

    // Questions
    if(!s.special){
      s.questions.forEach(q=>{
        const val=report.scores[s.id]?.[q.id];
        doc.setTextColor(80,80,80);
        doc.setFontSize(8);
        const lines=doc.splitTextToSize("• "+q.label,contentW-20);
        doc.text(lines,margin+2,y);
        doc.setTextColor(30,30,30);
        doc.setFontSize(9);
        doc.text(val!==undefined?val+"/5":"–",W-margin-2,y,{align:"right"});
        y+=lines.length*4+1;
      });
    } else {
      doc.setTextColor(80,80,80);
      doc.setFontSize(8);
      const avText=report.availability?.answer==="yes"?"Full menu available":
        "Items unavailable: "+(report.availability?.items||0)+" (pizzas: "+(report.availability?.pizzas||0)+")";
      doc.text("• "+avText,margin+2,y); y+=5;
    }

    // Notes
    if(report.notes[s.id]){
      doc.setTextColor(100,100,100);
      doc.setFontSize(8);
      const nLines=doc.splitTextToSize("Notes: "+report.notes[s.id],contentW-4);
      doc.text(nLines,margin+2,y);
      y+=nLines.length*4+1;
    }
    y+=3;
  });

  // Page 2 — Photos
  const photoSections=SECTIONS.filter(s=>PHOTO_RULES[s.id]&&PHOTO_RULES[s.id]!=="none"&&state.photoFiles[s.id]);
  if(photoSections.length>0){
    doc.addPage();
    let py=margin;
    doc.setFillColor(26,92,52);
    doc.rect(0,0,W,18,"F");
    doc.setTextColor(245,240,220);
    doc.setFontSize(12);
    doc.text("PHOTOS — "+report.restaurant.toUpperCase(),W/2,12,{align:"center"});
    py=25;

    for(const s of photoSections){
      const file=state.photoFiles[s.id];
      if(!file) continue;
      const dataUrl=await fileToDataURL(file);
      const imgW=contentW;
      const imgH=Math.min(80,imgW*0.6);
      if(py+imgH+10>285){break;}
      doc.setFontSize(9);
      doc.setTextColor(26,92,52);
      doc.text(s.label,margin,py); py+=5;
      doc.addImage(dataUrl,"JPEG",margin,py,imgW,imgH);
      py+=imgH+8;
    }
  }

  return doc.output("datauristring");
}

    const result=calcScores(state.scores,state.availability);
    const payload={
      restaurant:state.pizzeria,auditor:state.auditor,team:state.team,
      scores:state.scores,notes:state.notes,
      photo_urls:photoUrls,pct:result.pct,
      total_weighted:result.total,section_scores:result.sectionScores,
      availability:state.availability,
      audit_date:new Date().toISOString().split("T")[0]
    };
    const res=await fetch(SB_URL+"/rest/v1/audits",{
      method:"POST",
      headers:Object.assign({},H,{"Prefer":"return=minimal"}),
      body:JSON.stringify(payload)
    });
    if(!res.ok){const t=await res.text();throw new Error(t);}
    state.currentReport={...payload,...result};
    state.view="report";
    state.submitting=false;
    render();

    // Send email in background — doesn't block the confirmation screen
    try{
      const pdfDataUri=await generatePDF(state.currentReport);
      await sendEmail(state.currentReport,pdfDataUri);
    }catch(e){ console.error("Email/PDF error:",e); }
    return;
  }catch(e){
    state.submitError="Save failed: "+e.message;
  }
  state.submitting=false;render();
}

function resetForm(){
  state={...state,view:"form",pizzeria:"",auditor:"",team:"",scores:{},photoFiles:{},photoPreviews:{},notes:{},
    availability:{answer:"",items:"",pizzas:""},activeSection:0,submitting:false,submitError:"",currentReport:null};
  render();
}

function handlePhotoChange(sid,input){
  const file=input.files[0];if(!file)return;
  state.photoFiles[sid]=file;
  state.photoPreviews[sid]={url:URL.createObjectURL(file),name:file.name};
  render();
}

function banner(subtitle){
  return `<div class="top-banner"><div class="brand-name">Pizza Pilgrims</div><div class="page-title">${subtitle}</div></div>`;
}

function render(){
  const app=document.getElementById("app");
  if(state.view==="report") renderConfirm(app);
  else renderForm(app);
}

function renderConfirm(app){
  app.innerHTML=banner("Food Quality Audit")+`
  <div class="inner">
    <div class="confirm-wrap">
      <div class="confirm-check">✓</div>
      <div class="confirm-title">Audit Completed!</div>
      <div class="confirm-brand">pizz'&amp;love</div>
      <div class="confirm-meta">${state.currentReport.restaurant} · ${formatDate(state.currentReport.audit_date)}</div>
      <div style="margin:20px auto 28px;max-width:300px;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.2)"><img src="https://i.ibb.co/99gsW0yx/IMG-6616.jpg" style="width:100%;display:block"></div>
      <button class="btn-start" style="max-width:240px;margin:0 auto;display:block" onclick="resetForm()">New Audit</button>
    </div>
  </div>`;
}

function renderForm(app){
  const ac=answeredCount();
  const availNoteRequired=state.availability.answer==="no"&&!state.notes['availability'];
  const canSubmit=state.pizzeria&&state.auditor&&ac===TOTAL_WITH_PHOTOS&&!state.submitting&&!availNoteRequired;
  const s=SECTIONS[state.activeSection];
  const cols=["#E24B4A","#D85A30","#EF9F27","#639922","#1D9E75","#0F6E56"];

  let html=banner("Food Quality Audit")+'<div class="inner">';

  if(!state.pizzeria||!state.auditor){
    html+=`<div class="card">
      <div style="margin-bottom:14px"><label>Pizzeria</label>
        <select onchange="state.pizzeria=this.value;render()">
          <option value="">Select pizzeria…</option>
          ${RESTAURANTS.map(r=>`<option value="${r}"${state.pizzeria===r?" selected":""}>${r}</option>`).join("")}
        </select>
      </div>
      <div style="margin-bottom:14px"><label>Your name</label>
        <input type="text" id="auditor-input" value="${state.auditor}" placeholder="Your name" oninput="state.auditor=this.value">
      </div>
      <div><label>Your team</label>
        <input type="text" id="team-input" value="${state.team}" placeholder="Your team…" oninput="state.team=this.value">
      </div>
      ${state.pizzeria?`<button class="btn-start" onclick="state.auditor=document.getElementById('auditor-input').value;state.team=document.getElementById('team-input').value;if(state.auditor){state.activeSection=0;render();}">Start Audit →</button>`:""}
    </div>`;
  } else {
    const pct=Math.round((ac/TOTAL_WITH_PHOTOS)*100);
    html+=`<div class="progress-wrap">
      <div class="progress-info">
        <span style="display:flex;align-items:center;gap:8px">
          <button onclick="state.pizzeria='';state.auditor='';state.team='';state.activeSection=0;render()" style="font-size:11px;color:#1A5C34;background:none;border:0.5px solid #1A5C34;border-radius:6px;padding:2px 8px;cursor:pointer;font-family:'Chelsea',sans-serif">← Edit</button>
          <span>${state.pizzeria} · ${state.auditor}${state.team?" · "+state.team:""}</span>
        </span>
        <span>${ac}/${TOTAL_WITH_PHOTOS}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="tabs">
      ${SECTIONS.map((sec,i)=>{
        const done=sec.special?state.availability.answer!=="":sec.questions.every(q=>state.scores[sec.id]?.[q.id]!==undefined)&&(PHOTO_RULES[sec.id]!=="mandatory"||state.photoFiles[sec.id]);
        return `<button class="tab${state.activeSection===i?" active":done?" done":""}" onclick="state.activeSection=${i};render()">${sec.label}</button>`;
      }).join("")}
    </div>
    <div class="card">
      <div class="section-header"><span class="section-title">${s.label}</span></div>`;

    const av=state.availability;
    if(s.special==="availability"){
      html+=`<div class="question"><p>Is all the menu available?</p>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button class="yn-btn" onclick="state.availability.answer='yes';render()" style="border:${av.answer==='yes'?'2px solid #1A5C34':'1px solid #c8c2aa'};background:${av.answer==='yes'?'#1A5C34':'#fff'};color:${av.answer==='yes'?'#F5F0DC':'#111'}">Yes</button>
          <button class="yn-btn" onclick="state.availability.answer='no';render()" style="border:${av.answer==='no'?'2px solid #E24B4A':'1px solid #c8c2aa'};background:${av.answer==='no'?'#E24B4A':'#fff'};color:${av.answer==='no'?'#fff':'#111'}">No</button>
        </div>
        ${av.answer==='no'?`<div style="margin-top:14px">
          <div style="margin-bottom:12px"><label>How many items are unavailable?</label>
            <input type="number" min="0" value="${av.items}" placeholder="0" oninput="state.availability.items=this.value;state.availability.pizzas='';render()">
          </div>
          ${av.items>0?`<div><label>How many of those are pizzas?</label>
            <input type="number" min="0" max="${av.items}" value="${av.pizzas}" placeholder="0" oninput="state.availability.pizzas=this.value;render()">
          </div>`:''}
        </div>
        <div style="margin-top:14px">
          <label>List the unavailable items here</label>
          <textarea rows="3" placeholder="List the unavailable items here…" oninput="state.notes['availability']=this.value" style="border-color:${!state.notes['availability']?'#E24B4A':'#c8c2aa'}">${state.notes['availability']||""}</textarea>
          ${!state.notes['availability']?`<p style="font-size:11px;color:#E24B4A;margin-top:4px">Required — please list the unavailable items</p>`:""}
        </div>`:''}
      </div>`;
    } else {
      html+=s.questions.map(q=>{
        const val=state.scores[s.id]?.[q.id];
        return `<div class="question"><p>${q.label}</p>
          <div class="score-btns">
            ${[0,1,2,3,4,5].map(v=>`<button class="score-btn"
              onclick="if(!state.scores['${s.id}'])state.scores['${s.id}']={};state.scores['${s.id}']['${q.id}']=${v};render()"
              style="${val===v?`background:${cols[v]};color:#fff;border-color:${cols[v]};`:'border-color:#c8c2aa;'}">${v}</button>`).join("")}
          </div></div>`;
      }).join("");
      html+=`<textarea rows="2" placeholder="Notes (optional)…" oninput="state.notes['${s.id}']=this.value">${state.notes[s.id]||""}</textarea>`;
    }

    const photoRule=PHOTO_RULES[s.id];
    if(photoRule!=="none"){
      html+=`<div style="margin-top:10px">
        ${state.photoPreviews[s.id]
          ?`<div class="photo-preview"><img src="${state.photoPreviews[s.id].url}"><div><div class="photo-name">${state.photoPreviews[s.id].name}</div><button class="photo-change" onclick="document.getElementById('f-${s.id}').click()">Change photo</button></div></div>`
          :`<button class="photo-btn" onclick="document.getElementById('f-${s.id}').click()" style="${photoRule==='mandatory'?'border-color:#1A5C34;color:#1A5C34':''}">${photoRule==='mandatory'?'📷 Add pizza photo (required)':'📷 Add photo (optional)'}</button>`}
        <input type="file" id="f-${s.id}" accept="image/*" style="display:none" onchange="handlePhotoChange('${s.id}',this)">
        ${photoRule==='mandatory'&&!state.photoPreviews[s.id]?`<p style="font-size:11px;color:#E24B4A;margin-top:4px">Required — please add a photo of the pizza</p>`:""}
      </div>`;
    }

    html+=`</div>
    ${state.submitError?`<div class="error-box">${state.submitError}</div>`:""}
    <div class="btn-row">
      ${state.activeSection>0?`<button class="btn" onclick="state.activeSection--;render()">← Back</button>`:""}
      ${state.activeSection<SECTIONS.length-1
        ?`<button class="btn btn-primary" onclick="state.activeSection++;render()">Next →</button>`
        :`<button class="btn btn-primary"${canSubmit?"":" disabled"} onclick="handleSubmit()">${state.submitting?"Saving & sending…":"Submit Audit ✓"}</button>`}
    </div>
    ${!canSubmit&&ac<TOTAL_WITH_PHOTOS&&state.activeSection===SECTIONS.length-1?`<p class="hint">Answer all questions and add the pizza photo to submit</p>`:""}`;
  }
  html+='</div>';
  app.innerHTML=html;
}

render();
</script>
</body>
</html>
