<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza Pilgrims — Food Quality League Table</title>
<style>
@font-face { font-family: 'PizzaPilgrims'; src: url('PizzaPilgrims.otf') format('opentype'); font-weight: normal; }
@font-face { font-family: 'Chelsea'; src: url('ChelseaRRBold.otf') format('opentype'); font-weight: 700; }
@font-face { font-family: 'Chelsea'; src: url('ChelseaRRLight.otf') format('opentype'); font-weight: 300; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Chelsea', -apple-system, sans-serif; font-weight: 300; background: #1A5C34; min-height: 100vh;
  background-image: url('https://www.datocms-assets.com/94903/1741971975-pp-pizza-spread-with-menu.jpg?auto=format&w=2080');
  background-size: cover; background-position: center; background-attachment: fixed; }
body::before { content: ''; position: fixed; inset: 0; background: rgba(26,92,52,0.82); z-index: 0; }
.wrap { max-width: 600px; margin: 0 auto; padding: 0 0 3rem; position: relative; z-index: 1; background: #F5F0DC; min-height: 100vh; box-shadow: 0 0 60px rgba(0,0,0,0.4); }
.top-banner { background: #1A5C34; padding: 18px 20px 14px; text-align: center; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; }
.banner-center { text-align: center; flex: 1; }
.brand-name { font-family: 'PizzaPilgrims'; font-size: 18px; font-weight: normal; color: #39D400; letter-spacing: 0.05em; margin-bottom: 4px; }
.page-title { font-family: 'PizzaPilgrims'; font-size: 26px; font-weight: normal; color: #F5F0DC; letter-spacing: 0.03em; }
.refresh-btn { padding: 8px 14px; border-radius: 8px; border: 1px solid #39D400; background: transparent; color: #39D400; cursor: pointer; font-size: 13px; font-family: 'Chelsea', sans-serif; white-space: nowrap; }
.inner { padding: 0 1rem; }
.meta { font-size: 12px; color: #888; margin-bottom: 16px; }
.table-wrap { border: 0.5px solid #d4ceb8; border-radius: 12px; overflow: hidden; background: #fff; }
.table-head { display: grid; grid-template-columns: 40px 1fr 100px 90px; padding: 7px 16px; background: #1A5C34; }
.th { font-family: 'PizzaPilgrims'; font-size: 14px; color: #39D400; font-weight: normal; letter-spacing: 0.05em; }
.table-row { display: grid; grid-template-columns: 40px 1fr 100px 90px; padding: 7px 16px; border-bottom: 0.5px solid #ede8d8; align-items: center; background: #fff; }
.table-row:last-child { border-bottom: none; }
.table-row.top { background: rgba(26,92,52,0.05); }
.legend { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; font-size: 13px; color: #555; }
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-dot { width: 12px; height: 12px; border-radius: 6px; flex-shrink: 0; }
.loading { text-align: center; padding: 3rem; color: #888; font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-banner">
    <div style="width:90px"></div>
    <div class="banner-center">
      <div class="brand-name">Pizza Pilgrims</div>
      <div class="page-title">Food Quality League Table</div>
    </div>
    <button class="refresh-btn" onclick="loadLeague()">↻ Refresh</button>
  </div>
  <div class="inner">
    <p class="meta" id="meta"></p>
    <div id="table"><div class="loading">Loading…</div></div>
    <div class="legend">
      <div class="legend-item"><span style="font-size:16px">🤌</span>100% — Faje Paura!</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1A5C34"></div>95–99.99% — STARS!</div>
      <div class="legend-item"><div class="legend-dot" style="background:#39D400"></div>90–94.99% — Very good!</div>
      <div class="legend-item"><div class="legend-dot" style="background:#C8B97A"></div>85–89.99% — Good but..!</div>
      <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div>75–84.99% — Not great!</div>
      <div class="legend-item"><div class="legend-dot" style="background:#E24B4A"></div>Under 75% — NEED TO FIX URGENTLY!</div>
    </div>
  </div>
</div>
<script>
const SB_URL = "https://jjziogebkovhcxvsuayf.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqemlvZ2Via292aGN4dnN1YXlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjc3NDIsImV4cCI6MjA5MDcwMzc0Mn0.EBbrq-4c7IAA2YIevfiATuPcnDxf9WEzcwzaprdp_UI";

const RESTAURANTS = [
  "Birmingham","Brighton","Bristol","Camden","Cambridge","Canary Wharf","Cardiff",
  "Carnaby","Chelsea","Covent Garden","Edinburgh","Euston","Exmouth Market",
  "Glasgow","Greenwich","Hyde Park","King's Cross","Leeds","Liverpool Street",
  "London Bridge","Manchester","Nottingham","Queens Park","Selfridges","Shoreditch",
  "Soho","Spitalfields","Swingers West End","Victoria","Waterloo","Westfield",
  "Westfield Stratford","Wimbledon"
];

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function formatDate(d){ const p=d.split("-"); return parseInt(p[2])+"/"+MONTHS[parseInt(p[1])-1]+"/"+p[0].slice(2); }

function scoreColor(p){
  if(p===100) return "#1A5C34";
  if(p>=95) return "#1A5C34";
  if(p>=90) return "#39D400";
  if(p>=85) return "#C8B97A";
  if(p>=75) return "#EF9F27";
  return "#E24B4A";
}
function scoreLabel(p){
  if(p===100) return "Faje Paura!";
  if(p>=95) return "STARS!";
  if(p>=90) return "Very good!";
  if(p>=85) return "Good but..!";
  if(p>=75) return "Not great!";
  return "NEED TO FIX URGENTLY!";
}

async function loadLeague(){
  document.getElementById("meta").textContent="Loading…";
  document.getElementById("table").innerHTML='<div class="loading">Loading…</div>';
  try{
    const r=await fetch(SB_URL+"/rest/v1/audits?select=restaurant,pct,audit_date&order=audit_date.desc",{
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}
    });
    const rows=await r.json();

    // Build per-restaurant data
    const data={};
    (rows||[]).forEach(row=>{
      if(!data[row.restaurant]) data[row.restaurant]={latest:null,latestDate:null,scores:[]};
      if(!data[row.restaurant].latest){ data[row.restaurant].latest=row.pct; data[row.restaurant].latestDate=row.audit_date; }
      data[row.restaurant].scores.push(row.pct);
    });

    const all=RESTAURANTS.map(r=>{
      const d=data[r];
      if(!d) return {restaurant:r,latest:null,avg:null,latestDate:null};
      const avg=Math.round(d.scores.reduce((a,b)=>a+b,0)/d.scores.length);
      return {restaurant:r,latest:d.latest,avg,latestDate:d.latestDate,count:d.scores.length};
    });
    const sorted=[...all].sort((a,b)=>(b.avg??-1)-(a.avg??-1));

    document.getElementById("meta").textContent=Object.keys(data).length+" of "+RESTAURANTS.length+" pizzerias audited";

    let html=`<div class="table-wrap">
      <div class="table-head">
        <span class="th">#</span>
        <span class="th">Pizzeria</span>
        <span class="th" style="text-align:center">Last audit</span>
        <span class="th" style="text-align:center">Average</span>
        <span class="th" style="text-align:right">Date</span>
      </div>`;
    sorted.forEach((r,i)=>{
      html+=`<div class="table-row${r.latest!==null&&i===0?' top':''}">
        <span style="font-family:'PizzaPilgrims',sans-serif;font-size:15px;color:${r.avg!==null&&i<3?scoreColor(r.avg):'#ccc'}">${r.avg!==null?i+1:"–"}</span>
        <div style="font-size:13px;font-weight:${r.latest!==null?500:300};color:${r.latest!==null?'#111':'#bbb'}">${r.restaurant}</div>
        <div style="text-align:center">
          ${r.latest!==null
            ?`<div style="font-family:'PizzaPilgrims',sans-serif;font-size:15px;color:${scoreColor(r.latest)}">${r.latest}%</div>
               <div style="font-size:9px;color:${scoreColor(r.latest)}">${scoreLabel(r.latest)}</div>`
            :`<span style="color:#ccc">—</span>`}
        </div>
        <div style="text-align:center">
          ${r.avg!==null
            ?`<div style="font-family:'PizzaPilgrims',sans-serif;font-size:15px;color:${scoreColor(r.avg)}">${r.avg}%</div>
               <div style="font-size:9px;color:#aaa">${r.count} audit${r.count>1?'s':''}</div>`
            :`<span style="color:#ccc">—</span>`}
        </div>
        <div style="text-align:right;font-size:11px;color:#aaa">${r.latestDate?formatDate(r.latestDate):"—"}</div>
      </div>`;
    });
    html+='</div>';
    document.getElementById("table").innerHTML=html;
  }catch(e){
    document.getElementById("table").innerHTML='<div class="loading">Failed to load. Try refreshing.</div>';
  }
}

loadLeague();
</script>
</body>
</html>
